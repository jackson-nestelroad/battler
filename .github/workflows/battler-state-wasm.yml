name: battler-state-wasm

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      run_core: ${{ steps.detector.outputs.run_core }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect Changes
        uses: ./.github/actions/detect-changes
        id: detector

  test-battler-state-wasm:
    name: Build and test battler-state WASM
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.run_core == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: ./.github/actions/rust
      - name: Set up Node.js
        uses: ./.github/actions/nodejs
      - name: Build WASM Package
        run: npm run build:battler-state
      - name: Run WASM Unit Tests
        run: npm run test:battler-state:wasm
      - name: Run JS/TS Integration Tests
        run: npm run test:battler-state:js
