name: wamp-integration-tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  wamp-integration-tests:
    name: Run WAMP integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: ./.github/actions/rust
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: ${{ github.workspace }}/wamp-integration-tests/requirements.txt
      - name: Create virtual environment
        shell: bash
        run: |
          cd wamp-integration-tests
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ github.workspace }}/wamp-integration-tests/package-lock.json
      - name: Install npm dependencies
        run: npm ci
        working-directory: ${{ github.workspace }}/wamp-integration-tests
      - name: Run WAMP integration tests
        run: npm test
        working-directory: wamp-integration-tests
